name: Flutter CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  analyze-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.10.4'

    - name: Cache Pub packages (Linux/macOS)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: ${{ runner.os }}-pub-

    - name: Cache Pub packages (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: C:\\Users\\runneradmin\\AppData\\Local\\Pub\\Cache
        key: windows-pub-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: windows-pub-

    - name: Install dependencies
      run: flutter pub get

    - name: Run analyzer
      run: flutter analyze

    - name: Run tests (Linux/macOS)
      if: runner.os != 'Windows'
      run: bash scripts/check_env.sh

    - name: Run tests (Windows)
      if: runner.os == 'Windows'
      run: powershell -File scripts/check_env.ps1

  build-apk:
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
